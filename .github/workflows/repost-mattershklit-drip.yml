name: Drip-publish queued 虛詞 → @mattershklit

# Publishes queued p_articles drafts at their slot times. We drive the timing
# ourselves (publish-now, one article per run) instead of Matters' publishAt,
# because Matters rate-limits publishArticle — including its native scheduling.
on:
  schedule:
    # 09:00 / 10:00 / 11:00 HKT = 01:00 / 02:00 / 03:00 UTC, on
    # Tue(2) Wed(3) Fri(5) Sat(6) Sun(0). Each run publishes whatever is due.
    - cron: "0 1,2,3 * * 0,2,3,5,6"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't publish)"
        required: false
        default: "false"

permissions:
  contents: write

env:
  SOURCE: p_articles
  STATE_FILE: state/mattershklit.json

jobs:
  drip:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Publish due queued drafts
        env:
          MATTERS_EMAIL: ${{ secrets.MATTERS_EMAIL }}
          MATTERS_PASSWORD: ${{ secrets.MATTERS_PASSWORD }}
        run: |
          ARGS="--source $SOURCE --state $STATE_FILE --drip"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m bot.main $ARGS

      - name: Commit updated queue
        run: |
          QUEUE="${STATE_FILE%.json}_queue.json"
          git add "$QUEUE" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "queue unchanged"
            exit 0
          fi
          git config user.name "repost-bot"
          git config user.email "repost-bot@users.noreply.github.com"
          git commit -m "chore: drip-publish queue update ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          for attempt in 1 2 3; do
            if git push; then echo "pushed on attempt $attempt"; exit 0; fi
            echo "push attempt $attempt rejected; rebasing"
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "push failed after 3 attempts"
          exit 1
